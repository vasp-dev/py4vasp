name: publish-full

on:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g., v0.1.0
      - v*

jobs:
  test-full:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v5
    - name: Set up conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
    - name: Configure conda channel priority
      shell: bash -el {0}
      run: |
        conda config --set channel_priority strict
        conda config --remove channels defaults
        conda config --add channels conda-forge
    - name: Set up uv
      shell: bash -el {0}
      run: |
        conda install -q conda-forge::uv
        uv --version
    - name: Install py4vasp
      shell: bash -el {0}
      run: |
        export VIRTUAL_ENV=$CONDA_PREFIX
        uv sync --active
        uv version
    - name: Install mdtraj with conda
      shell: bash -el {0}
      run: |
        conda info
        conda install -q conda-forge::mdtraj
    - name: Test with pytest
      shell: bash -el {0}
      run: |
        export VIRTUAL_ENV=$CONDA_PREFIX
        uv run --active pytest --version
        uv run --active pytest --cov=py4vasp --cov-report term
    - name: Check code style
      shell: bash -el {0}
      run: |
        export VIRTUAL_ENV=$CONDA_PREFIX
        uv run --active isort --version
        uv run --active isort --check src
        uv run --active isort --check tests
        uv run --active black --version
        uv run --active black --check src
        uv run --active black --check tests

  publish-full:
    needs: test-full
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Build
        run: uv build
      # Check that basic features work and we didn't miss to include crucial files
      # - name: Smoke test (wheel)
      #   run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py
      # - name: Smoke test (source distribution)
      #   run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py
      - name: Publish
        run: uv publish
